<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Life Medical Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <img src="Healthy life logo.jpg" alt="healthy life medical center logo" class="logo">
        <h2>Healthy Life Medical Center - Patient Registration Form</h2>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname"><br><br>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" class="text-input"><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" class="text-input"><br>   

        <label for="D.O.B">Date of Birth:</label>
        <input type="date" id="D.O.B" name="D.O.B" class="text-input"><br>
        
        <label for="Gender">Gender:</label><br>
        <label for="male">Male:</label>
        <input type="radio" id="male" name="Gender" value="male">
        <label for="female">Female:</label>
        <input type="radio" id="female" name="Gender" value="female">
        <label for="other">Other:</label>
        <input type="radio" id="other" name="Gender" value="other"><br><br>
       

        <label for="condition">Medical Condition:</label> <br>
        <label for="Diabetes">Diabetes</label>
        <input type="checkbox" id="Diabetes" name="Diabetes"value="Diabetes">
        <label for="Hypertension">Hypertension:</label>
        <input type="checkbox" id="Hypertension" name="Hypertension"value="Hypertension">
        <label for="Asthma">Asthma</label>
        <input type="checkbox" id="Asthma" name="Asthma"value="Asthma">
        <label for="none">None:</label>
        <input type="checkbox" id="none" name="none"value="none"><br><br>

        <label for="Department">Department:</label>
        <select id="Department" name="Department" class="text-input"><br>
            <option value="General Medicine">General Medicine</option>
            <option value="Pediatrics">Pediatrics</option>
            <option value="Dentistry">Dentistry</option>
            <option value="Laboratory">Laboratory</option>
        </select><br>
        
        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4" cols="50" class="text-input"></textarea><br>
    <button type="submit" value="Submit"> Submit</button>
    <button type="reset" value="Reset">Reset</button>    
    </form>
</body>
