<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Life Medical Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h2>Healthy Life Medical Center</h2>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname"><br>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname"><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br>   

        <label for="D.O.B">Date of Birth:</label>
        <input type="date" id="D.O.B" name="D.O.B"><br>
        
        <label for="Gender">Gender:</label><br>
        <input type="radio" id="male" name="Gender" value="male"><br>
        <label for="male">Male</label>
        <input type="radio" id="female" name="Gender" value="female"><br>
        <label for="female">Female</label>
        <input type="radio" id="other" name="Gender" value="other"><br>
        <label for="other">Other</label>

        <label for="condition">Medical Condition:</label>
        <input type="checkbox" id="Diabetes" name="Diabetes"value="Diabetes"><br>
        <label for="Diabetes">Diabetes</label>
        <input type="checkbox" id="Hypertension" name="Hypertension"value="Hypertension"><br>
        <label for="Hypertension">Hypertension:</label>
        <label for="Asthma">Asthma</label>
        <input type="checkbox" id="Asthma" name="Asthma"value="Asthma"><br>
        <label for="none">None:</label>
        <input type="checkbox" id="none" name="none"value="none"><br>

        <label for="Department">Department:</label>
        <select id="Department" name="Department"><br>
            <option value="General Medicine">General Medicine</option>
            <option value="Pediatrics">Pediatrics</option>
            <option value="Dentistry">Dentistry</option>
            <option value="Laboratory">Laboratory</option>
        </select><br>
        
        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4" cols="50"></textarea><br>
    <button>
        <input type="submit" value="Submit">
        </button>
        <button>
        <input type="reset" value="Reset">
    </button>    
    </form>
</body>
</html>
